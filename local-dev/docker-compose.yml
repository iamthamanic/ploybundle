services:
  postgres:
    image: postgres:16-alpine
    container_name: localdev-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    networks:
      - ploybundle
  adminer:
    image: adminer:latest
    container_name: localdev-adminer
    restart: unless-stopped
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
      - ADMINER_DESIGN=pepa-linha
    ports:
      - 8088:8080
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - ploybundle
  redis:
    image: redis:7-alpine
    container_name: localdev-redis
    restart: unless-stopped
    env_file:
      - .env
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - yes
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - ${REDIS_PASSWORD}
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - ploybundle
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: localdev-seaweedfs
    restart: unless-stopped
    command:
      - server
      - -dir=/data
      - -filer
      - -s3
      - -s3.config=/etc/seaweedfs/s3.json
    ports:
      - 8333:8333
      - 9333:9333
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:9333/cluster/healthz || exit 1
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    networks:
      - ploybundle
  seaweedfs-bootstrap:
    image: alpine:3.20
    container_name: localdev-seaweedfs-bootstrap
    restart: no
    env_file:
      - .env
    volumes:
      - ./scripts:/scripts:ro
    command:
      - sh
      - -c
      - apk add --no-cache aws-cli wget >/dev/null && sh /scripts/init-buckets.sh
    depends_on:
      seaweedfs:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - ploybundle
  directus:
    image: directus/directus:11
    container_name: localdev-directus
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - 8055:8055
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
      - ./scripts:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://127.0.0.1:8055/server/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    networks:
      - ploybundle
  directus-bootstrap:
    image: alpine:3.20
    container_name: localdev-directus-bootstrap
    restart: no
    env_file:
      - .env
    volumes:
      - ./scripts:/scripts:ro
    command:
      - sh
      - -c
      - apk add --no-cache curl jq >/dev/null && sh /scripts/bootstrap-directus.sh && sh /scripts/setup-directus-roles.sh
    depends_on:
      directus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - ploybundle
  windmill:
    image: ghcr.io/windmill-labs/windmill:1.659
    container_name: localdev-windmill
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${WINDMILL_DATABASE_URL}
      - BASE_URL=http://127.0.0.1:8000
      - SUPERADMIN_SECRET=${WINDMILL_SECRET}
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://127.0.0.1:8000/api/version || exit 1
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"
    networks:
      - ploybundle
  windmill-worker:
    image: ghcr.io/windmill-labs/windmill:1.659
    container_name: localdev-windmill-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${WINDMILL_DATABASE_URL}
      - MODE=worker
      - WORKER_GROUP=default
    depends_on:
      windmill:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    networks:
      - ploybundle
  windmill-bootstrap:
    image: alpine:3.20
    container_name: localdev-windmill-bootstrap
    restart: no
    env_file:
      - .env
    volumes:
      - ./scripts:/scripts:ro
    command:
      - sh
      - -c
      - apk add --no-cache curl >/dev/null && sh /scripts/bootstrap-windmill.sh
    depends_on:
      windmill:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - ploybundle
  nextjs:
    image: node:20-alpine
    container_name: localdev-nextjs
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - 3001:3000
    volumes:
      - ./app:/app
    command:
      - sh
      - -c
      - cd /app && npm install && npm run dev -- --hostname 0.0.0.0 --port 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://127.0.0.1:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    networks:
      - ploybundle
  hub:
    build:
      context: ./hub
      dockerfile: Dockerfile
    container_name: localdev-hub
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ADMIN_EMAIL=${DIRECTUS_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${DIRECTUS_ADMIN_PASSWORD}
      - HUB_LOGS_ENABLED=1
      - HUB_SHOW_ENV_KEY_NAMES=1
    ports:
      - 7580:3000
    depends_on:
      postgres:
        condition: service_healthy
      directus:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://127.0.0.1:3000 || exit 1
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    user: 0:0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - ploybundle
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  seaweedfs_data:
    driver: local
  directus_uploads:
    driver: local
  directus_extensions:
    driver: local
networks:
  ploybundle:
    driver: bridge
